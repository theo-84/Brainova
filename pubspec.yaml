name: brainova
description: "A Brainova Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^17.0.1
  google_fonts: ^8.0.0
  lucide_icons: ^0.257.0
  cupertino_icons: ^1.0.8
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  google_sign_in: ^6.2.1
  firebase_storage: ^13.0.6
  image_picker: ^1.0.7
  intl: ^0.20.2
  connectivity_plus: ^7.0.0
  flutter_animate: ^4.5.2
  shared_preferences: ^2.5.4
  flutter_local_notifications: ^17.1.2
  permission_handler: ^11.3.1
  flutter_background_service: ^5.0.10
  firebase_app_check: ^0.4.1+5
  lottie: ^3.1.2
  just_audio: ^0.9.42

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  integration_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/sedraicon.jpeg"
  min_sdk_android: 21
  adaptive_icon_foreground: "assets/images/sedraicon2_ic.png"
  adaptive_icon_background: "#ffffff"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
    - assets/lottie/
    - assets/neck_stretch.json
  fonts:
    - family: MontserratAlt
      fonts:
        - asset: assets/fonts/MontserratAlternates-Bold.ttf
    - family: Sora
      fonts:
        - asset: assets/fonts/Sora-Regular.ttf
        - asset: assets/fonts/Sora-SemiBold.ttf
        - asset: assets/fonts/Sora-Bold.ttf
